<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>书搭子</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    /* ===== 全局重置 & 字体 ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #8B7E74;
      --primary-dark: #5A4F46;
      --bg-main: #F9F5F0;
      --bg-card: #FDFAF7;
      --accent: #C49B7A;
      --accent-light: #E8D5C4;
      --text-main: #3D3631;
      --text-muted: #A99B91;
      --border-light: #F0EAE3;
      --shadow-soft: 0 4px 20px rgba(139, 126, 116, 0.08);
      --radius: 12px;
      --font-serif: 'Georgia', 'Times New Roman', 'Songti SC', serif;
      --font-sans: 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg-main);
      min-height: 100vh;
    }

    /* ── 页面容器 ── */
    .page-container {
      height: 100vh;
      overflow-y: auto;
      padding: 0 16px 80px;
      scroll-behavior: smooth;
    }
    .page-container::-webkit-scrollbar { width: 3px; }
    .page-container::-webkit-scrollbar-thumb {
      background: var(--accent-light);
      border-radius: 10px;
    }

    /* ── 页面切换 ── */
    .page { display: none; animation: fadeUp 0.35s ease; }
    .page.active { display: block; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── 底部导航 ── */
    .bottom-nav {
      position: fixed;
      bottom: 8px;
      left: 8px;
      right: 8px;
      background: rgba(255, 252, 248, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 24px;
      box-shadow: 0 4px 24px rgba(139, 126, 116, 0.12);
      display: flex;
      justify-content: space-around;
      padding: 8px 0 6px;
      z-index: 20;
      border: 1px solid rgba(255, 255, 255, 0.4);
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
      font-size: 10px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s ease;
      padding: 4px 14px;
      border-radius: 20px;
      background: transparent;
      border: none;
      font-family: var(--font-sans);
    }
    .nav-item i { font-size: 18px; transition: all 0.2s ease; }
    .nav-item.active { color: var(--accent); }
    .nav-item.active i { transform: translateY(-2px); }
    .nav-item:hover { color: var(--primary); }

    /* ── 通用组件 ── */
    .section-title {
      font-size: 13px;
      color: var(--text-muted);
      letter-spacing: 2px;
      margin: 20px 0 12px;
      font-weight: 400;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-light);
    }

    .verse-line {
      font-family: var(--font-serif);
      font-size: 15px;
      color: var(--primary);
      text-align: center;
      padding: 16px 0 4px;
      letter-spacing: 1px;
      line-height: 1.8;
      font-style: italic;
    }
    .verse-line small {
      font-size: 12px;
      color: var(--text-muted);
      font-style: normal;
      font-family: var(--font-sans);
    }

    /* ── 笔记卡片 ── */
    .card-note {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 16px 18px 12px;
      margin-bottom: 12px;
      box-shadow: var(--shadow-soft);
      border: 1px solid rgba(255, 255, 255, 0.6);
      transition: all 0.2s ease;
      cursor: pointer;
    }
    .card-note:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 28px rgba(139, 126, 116, 0.10);
    }
    .card-note .book-title {
      font-size: 12px;
      color: var(--accent);
      font-weight: 500;
      letter-spacing: 0.3px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .card-note .book-title i { font-size: 11px; color: var(--accent-light); }
    .card-note .content {
      font-size: 14px;
      line-height: 1.8;
      color: var(--text-main);
      margin: 6px 0 10px;
      font-family: var(--font-serif);
      letter-spacing: 0.3px;
    }
    .card-note .content.quote {
      font-size: 16px;
      padding: 4px 0 0 10px;
      border-left: 2px solid var(--accent-light);
      font-style: italic;
      color: var(--primary-dark);
    }
    .card-note .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: var(--text-muted);
    }
    .card-note .meta .user {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .card-note .meta .user .avatar {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--accent-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      color: var(--accent);
      font-weight: 500;
    }
    .card-note .meta .actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .card-note .meta .actions span {
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      transition: color 0.2s;
    }
    .card-note .meta .actions span:hover { color: var(--accent); }
    .card-note .meta .actions .liked { color: #e07a5f; }

    /* ── 书单卡片 ── */
    .card-booklist {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 14px 16px 12px;
      margin-bottom: 12px;
      box-shadow: var(--shadow-soft);
      border: 1px solid rgba(255, 255, 255, 0.6);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .card-booklist:hover { transform: translateY(-1px); }
    .card-booklist .title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-main);
      letter-spacing: 0.3px;
    }
    .card-booklist .title i { color: var(--accent); margin-right: 5px; font-size: 13px; }
    .card-booklist .desc {
      font-size: 12px;
      color: var(--text-muted);
      margin: 4px 0 8px;
      line-height: 1.5;
    }
    .card-booklist .book-strip {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .card-booklist .book-strip .book-tag {
      background: var(--bg-main);
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 11px;
      color: var(--primary);
      border: 1px solid var(--border-light);
    }
    .card-booklist .meta {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
    }

    /* ── 金句卡片 ── */
    .quote-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 24px 20px 18px;
      margin-bottom: 14px;
      box-shadow: var(--shadow-soft);
      border: 1px solid rgba(255, 255, 255, 0.6);
      text-align: center;
    }
    .quote-card .quote-text {
      font-family: var(--font-serif);
      font-size: 18px;
      line-height: 1.9;
      color: var(--text-main);
      font-style: italic;
      letter-spacing: 0.5px;
    }
    .quote-card .quote-source {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 6px;
      font-style: normal;
      font-family: var(--font-sans);
    }
    .quote-card .quote-meta {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 12px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .quote-card .quote-meta span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* ── 发布页 ── */
    .publish-area { padding-top: 8px; }
    .publish-header {
      font-size: 20px;
      font-weight: 300;
      color: var(--text-main);
      letter-spacing: 1px;
      font-family: var(--font-serif);
      padding: 4px 0 4px;
    }
    .book-select {
      border-bottom: 1px solid var(--border-light);
      padding: 10px 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .book-select input {
      border: none;
      background: transparent;
      font-size: 14px;
      color: var(--text-main);
      width: 100%;
      outline: none;
      font-family: var(--font-sans);
    }
    .book-select input::placeholder {
      color: var(--text-muted);
      font-weight: 300;
      letter-spacing: 0.5px;
    }
    .book-select i { color: var(--text-muted); font-size: 14px; }

    .publish-area textarea {
      width: 100%;
      border: none;
      background: transparent;
      font-size: 16px;
      line-height: 1.8;
      color: var(--text-main);
      outline: none;
      resize: none;
      padding: 12px 0 8px;
      min-height: 150px;
      max-height: 300px;
      font-family: var(--font-serif);
      letter-spacing: 0.3px;
    }
    .publish-area textarea::placeholder {
      color: #c4b9af;
      font-style: italic;
      font-size: 15px;
    }

    .type-selector {
      display: flex;
      gap: 16px;
      padding: 10px 0 14px;
      border-top: 1px solid var(--border-light);
    }
    .type-selector label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
    }
    .type-selector input[type="radio"] {
      appearance: none;
      width: 14px;
      height: 14px;
      border: 1.5px solid var(--text-muted);
      border-radius: 50%;
      outline: none;
      cursor: pointer;
      transition: all 0.2s;
    }
    .type-selector input[type="radio"]:checked {
      border-color: var(--accent);
      background: var(--accent);
      box-shadow: inset 0 0 0 3px var(--bg-card);
    }

    .actions-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 10px;
      border-top: 1px solid var(--border-light);
    }
    .actions-row .add-image {
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
    }
    .actions-row .add-image:hover { color: var(--accent); }

    .btn-publish {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 8px 28px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.25s ease;
      font-family: var(--font-sans);
    }
    .btn-publish:hover {
      background: var(--primary);
      transform: scale(1.02);
    }

    /* ── 我的页面 ── */
    .profile-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 0 10px;
      border-bottom: 1px solid var(--border-light);
    }
    .profile-header .avatar-large {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--accent-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: var(--accent);
      margin-bottom: 8px;
      border: 2px solid rgba(255, 255, 255, 0.6);
    }
    .profile-header .name {
      font-size: 16px;
      color: var(--text-main);
      font-weight: 500;
      letter-spacing: 0.5px;
    }
    .profile-header .bio {
      font-size: 12px;
      color: var(--text-muted);
      font-family: var(--font-serif);
      font-style: italic;
      margin-top: 3px;
    }

    .profile-stats {
      display: flex;
      justify-content: center;
      gap: 28px;
      padding: 12px 0 8px;
      border-bottom: 1px solid var(--border-light);
    }
    .profile-stats .stat { text-align: center; }
    .profile-stats .stat .num {
      font-size: 18px;
      font-weight: 500;
      color: var(--text-main);
      font-family: var(--font-serif);
    }
    .profile-stats .stat .label {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    .reading-status { margin-top: 14px; }
    .reading-status .item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--border-light);
      font-size: 13px;
      color: var(--text-main);
    }
    .reading-status .item .tag {
      font-size: 10px;
      color: var(--text-muted);
      background: var(--bg-main);
      padding: 2px 10px;
      border-radius: 20px;
      margin-right: 8px;
    }
    .reading-status .item .progress-bar {
      width: 60px;
      height: 3px;
      background: var(--border-light);
      border-radius: 4px;
      overflow: hidden;
    }
    .reading-status .item .progress-bar .fill {
      height: 100%;
      background: var(--accent);
      border-radius: 4px;
    }

    /* ── 空状态 ── */
    .empty-state {
      text-align: center;
      padding: 40px 0 20px;
      color: var(--text-muted);
    }
    .empty-state i {
      font-size: 36px;
      color: var(--accent-light);
      margin-bottom: 10px;
      display: block;
    }
    .empty-state p {
      font-size: 13px;
      letter-spacing: 0.5px;
      font-family: var(--font-serif);
      color: #b8aba0;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--text-main);
      color: var(--bg-card);
      padding: 8px 20px;
      border-radius: 30px;
      font-size: 12px;
      opacity: 0;
      transition: all 0.4s ease;
      pointer-events: none;
      white-space: nowrap;
      font-weight: 300;
      letter-spacing: 0.5px;
      z-index: 30;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── 加载状态 ── */
    .loading {
      text-align: center;
      padding: 30px 0;
      color: var(--text-muted);
      font-size: 13px;
      letter-spacing: 1px;
    }
    .loading .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid var(--accent-light);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- 页面容器 -->
  <div class="page-container" id="pageContainer">

    <!-- ════════════ 首页 ════════════ -->
    <div class="page active" id="page-home">
      <div class="verse-line">
        “我们读书，然后不孤单。”
        <br /><small>—— 今日寄语</small>
      </div>

      <div class="section-title"><i class="far fa-star" style="color:var(--accent);"></i> 今日热读</div>

      <!-- 动态渲染区域 -->
      <div id="home-feed"></div>

      <div style="text-align:center;padding:18px 0 6px;color:var(--text-muted);font-size:12px;letter-spacing:1px;">
        —— 已全部加载 ——
      </div>
    </div>

    <!-- ════════════ 发布页 ════════════ -->
    <div class="page" id="page-publish">
      <div class="publish-area">
        <div class="publish-header">✎ 写笔记</div>

        <div class="book-select">
          <i class="fas fa-search"></i>
          <input type="text" placeholder="搜索或输入书名…" id="bookInput" />
        </div>

        <textarea placeholder="写下你的读书笔记、摘录或感想…" id="noteContent" maxlength="2000"></textarea>
        <div style="text-align:right;font-size:11px;color:var(--text-muted);" id="charCount">0 / 2000</div>

        <div class="type-selector">
          <label><input type="radio" name="noteType" value="笔记" checked /> 笔记</label>
          <label><input type="radio" name="noteType" value="摘录" /> 摘录</label>
          <label><input type="radio" name="noteType" value="书评" /> 书评</label>
        </div>

        <div class="actions-row">
          <span class="add-image" id="addImageBtn">
            <i class="far fa-image"></i> 添加图片
          </span>
          <button class="btn-publish" id="publishBtn">发布</button>
        </div>

        <div style="margin-top: 20px; border-top:1px solid var(--border-light); padding-top:14px;">
          <div class="section-title" style="margin-top:0;"><i class="far fa-clock" style="color:var(--accent);"></i> 最近发布</div>
          <div id="recent-notes"></div>
        </div>
      </div>
    </div>

    <!-- ════════════ 我的页面 ════════════ -->
    <div class="page" id="page-profile">
      <div class="profile-header">
        <div class="avatar-large">📖</div>
        <div class="name" id="profile-name">书友</div>
        <div class="bio" id="profile-bio">读万卷书，行万里路。</div>
      </div>

      <div class="profile-stats">
        <div class="stat"><div class="num" id="stat-notes">0</div><div class="label">笔记</div></div>
        <div class="stat"><div class="num" id="stat-favorites">0</div><div class="label">收藏</div></div>
        <div class="stat"><div class="num" id="stat-booklists">0</div><div class="label">书单</div></div>
      </div>

      <div class="reading-status">
        <div class="section-title" style="margin-top:10px;"><i class="fas fa-bookmark" style="color:var(--accent);"></i> 阅读记录</div>
        <div id="reading-list"></div>
      </div>

      <div class="section-title" style="margin-top:14px;"><i class="far fa-pen" style="color:var(--accent);"></i> 我的笔记</div>
      <div id="my-notes-list"></div>

      <div style="text-align:center;padding:20px 0 6px;color:var(--text-muted);font-size:12px;" id="my-notes-count"></div>
    </div>

  </div><!-- /page-container -->

  <!-- 底部导航 -->
  <div class="bottom-nav" id="bottomNav">
    <button class="nav-item active" data-page="home">
      <i class="fas fa-home"></i>
      <span>首页</span>
    </button>
    <button class="nav-item" data-page="publish">
      <i class="fas fa-pen-fancy"></i>
      <span>写笔记</span>
    </button>
    <button class="nav-item" data-page="profile">
      <i class="fas fa-user"></i>
      <span>我的</span>
    </button>
  </div>

  <script src="community.js"></script>
</body>
</html>
