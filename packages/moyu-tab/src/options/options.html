<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>工位搭子 · 设置</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
      background: #1c1c1c;
      color: #e4e4e4;
      padding: 48px 24px;
      min-height: 100vh;
    }
    .container { max-width: 380px; margin: 0 auto; }
    .header {
      border-bottom: 1px solid #333;
      padding-bottom: 16px;
      margin-bottom: 32px;
    }
    h1 {
      font-size: 20px;
      font-weight: 700;
      color: #e8e8e8;
      letter-spacing: 2px;
    }
    .subtitle {
      font-size: 13px;
      color: #a3a3a3;
      margin-top: 4px;
    }
    .field {
      margin-bottom: 24px;
    }
    label {
      display: block;
      font-size: 13px;
      color: #a3a3a3;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }
    input[type="time"] {
      width: 100%;
      padding: 12px 14px;
      font-size: 16px;
      font-family: inherit;
      border: 1px solid #333;
      border-radius: 8px;
      background: #242424;
      color: #e4e4e4;
      outline: none;
      transition: border-color 0.2s;
      color-scheme: dark;
    }
    input[type="time"]:focus {
      border-color: #f97316;
    }
    .btn {
      width: 100%;
      padding: 12px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      border: none;
      border-radius: 8px;
      background: rgba(249, 115, 22, 0.1);
      color: #fb923c;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn:hover {
      background: rgba(249, 115, 22, 0.2);
    }
    .status {
      text-align: center;
      font-size: 13px;
      padding: 10px;
      margin-top: 16px;
      border-radius: 8px;
      display: none;
    }
    .status.show { display: block; animation: fadeIn 0.3s ease; }
    .status-success {
      background: rgba(249, 115, 22, 0.1);
      color: #fb923c;
      border: 1px solid #7c3a0a;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>⚙️ 工位搭子</h1>
      <p class="subtitle">配置午餐时间</p>
    </div>

    <div class="field">
      <label>午餐时间</label>
      <input type="time" id="lunchTime" value="11:30" />
    </div>

    <button class="btn" id="btnSave">保存</button>
    <div class="status" id="status"></div>
  </div>

  <script src="options.js"></script>
</body>
</html>
