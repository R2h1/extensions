<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>新标签页</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--glass:rgba(255,255,255,0.6);--glass-hover:rgba(255,255,255,0.75);--glass-border:rgba(0,0,0,0.04);--glass-border-h:rgba(0,0,0,0.08);--glass-accent:rgba(217,119,6,0.08);--shadow-sm:0 0.5px 1.5px rgba(0,0,0,0.04);--shadow-md:0 4px 12px rgba(0,0,0,0.05);--nm-surface:#efeff1;--nm-out:3px 3px 7px rgba(174,174,178,.12),-3px -3px 7px rgba(255,255,255,.6);--nm-out-h:4px 4px 9px rgba(174,174,178,.16),-4px -4px 9px rgba(255,255,255,.65);--nm-out-sm:2px 2px 5px rgba(174,174,178,.12),-2px -2px 5px rgba(255,255,255,.6);--nm-out-lg:6px 6px 16px rgba(174,174,178,.18),-6px -6px 16px rgba(255,255,255,.65);--nm-in:inset 3px 3px 6px rgba(174,174,178,.2),inset -3px -3px 6px rgba(255,255,255,.7);--nm-in-sm:inset 3px 3px 5px rgba(174,174,178,.25),inset -3px -3px 5px rgba(255,255,255,.65);--text:#1d1d1f;--text-secondary:#86868b;--text-tertiary:#aeaeb2;--accent:#d97706;--radius:14px;--radius-sm:9px;--radius-xs:7px}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif;background:#f2f2f4;color:var(--text);background-size:cover;background-position:center;background-attachment:fixed;transition:background-image 0.5s ease}
.sidebar{opacity:0;visibility:hidden}
html:not(.locked) .sidebar{opacity:1;visibility:visible}
html.animated .sidebar{transition:opacity 0.4s ease,visibility 0.4s}
html.locked .widget-card{opacity:0;visibility:hidden;transition:opacity 0.35s ease,visibility 0.35s}
html.locked .entry-btn{opacity:0;visibility:hidden;transition:opacity 0.3s ease,visibility 0.3s}
html.locked .entry-grid{opacity:0;visibility:hidden;transition:opacity 0.3s ease,visibility 0.3s}
#timeDisplay{transition:font-size 0.5s cubic-bezier(0.25,0.1,0.25,1)}
html.locked #timeDisplay{font-size:120px!important}
html.locked #dateDisplay{font-size:24px!important;transition:font-size 0.5s ease}
.app{display:flex;height:100vh;position:relative;z-index:1}
.sidebar{width:120px;flex-shrink:0;display:flex;flex-direction:column;padding:28px 8px 12px;background:var(--nm-surface);border-right:0.5px solid rgba(0,0,0,0.05)}
.sidebar-nav{flex:1;display:flex;flex-direction:column;gap:2px}
.ic{width:20px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.sb-btn{display:flex;align-items:center;gap:4px;padding:8px 12px;border-radius:var(--radius-xs);background:transparent;border:none;color:var(--text-secondary);font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;transition:all 0.15s;text-align:left;width:100%;position:relative}
.sb-btn:hover{color:var(--text);background:var(--glass-accent)}
.sb-btn.active{color:var(--accent);background:var(--nm-surface);font-weight:600;box-shadow:3px 3px 8px rgba(174,174,178,.3),-3px -3px 8px rgba(255,255,255,.8)}
.sb-div{height:0.5px;background:rgba(0,0,0,0.06);margin:6px 12px}
.sb-group{display:flex;flex-direction:column}
.sb-top{justify-content:space-between}
.sb-arrow{font-size:10px;color:var(--text-tertiary);transition:transform .2s}
.sb-group.open .sb-arrow{transform:rotate(180deg)}
.sb-subs{display:none;flex-direction:column;gap:1px;padding-left:14px}
.sb-group.open .sb-subs{display:flex}
.sb-sub{font-size:12px;padding:6px 12px;color:var(--text-tertiary)}
.sb-sub:hover{color:var(--text-secondary);background:var(--glass-accent)}
.sb-sub.active{color:var(--accent);font-weight:600;background:var(--glass-accent)}
.content{flex:1;display:flex;justify-content:center;overflow-y:auto;min-width:0}
.ci{width:100%;max-width:768px;display:flex;flex-direction:column;padding:32px 28px 20px}
.cat-panel{display:none;column-count:2;column-gap:10px;padding:4px 0}
.cat-panel.active{display:block}
.cat-panel > *{break-inside:avoid;margin-bottom:10px}
.sal-card{container-type:inline-size}
.clock-bar{text-align:center;padding:0 20px 12px}
.cat-panel .empty{column-span:all;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:36px 0;color:var(--text-tertiary);font-size:13px}
.cat-panel .add-hint{font-size:11px;color:var(--text-tertiary)}
.widget-card{background:var(--nm-surface);backdrop-filter:none;-webkit-backdrop-filter:none;border:none;border-radius:var(--radius);padding:16px;box-shadow:var(--nm-out);transition:all 0.2s}
.widget-card:hover{border:none;background:var(--nm-surface);box-shadow:var(--nm-out-h)}
.widget-card.clickable{cursor:pointer}
.widget-card.clickable:hover{border:none;box-shadow:var(--nm-out-h),0 0 0 1px var(--glass-accent)}
.widget-title{font-size:10px;font-weight:600;color:var(--text-tertiary);letter-spacing:2px;margin-bottom:8px}
.widget-entry{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-secondary);font-weight:500}
.widget-entry .arrow{font-size:18px;color:var(--text-tertiary);margin-left:auto}
html.locked #wg-clock{position:fixed;top:30%;left:42%}
html.locked .clock-bar{padding:0}
/* modal */
.mo{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.18);backdrop-filter:none;-webkit-backdrop-filter:none;align-items:center;justify-content:center;padding:24px}
.mo.open{display:flex}
.ms{background:var(--nm-surface);backdrop-filter:none;-webkit-backdrop-filter:none;border-radius:20px;width:100%;max-width:500px;max-height:80vh;box-shadow:var(--nm-out-lg);display:flex;flex-direction:column;animation:mi 0.3s ease-out;overflow:hidden}
@keyframes mi{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
.mh{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 0;flex-shrink:0}
.mh .mt{font-size:14px;font-weight:600}
.mh .mc{background:none;border:none;color:var(--text-tertiary);cursor:pointer;font-size:16px;width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.mh .mc:hover{background:rgba(0,0,0,0.05);color:var(--text)}
.modal-split{flex:1;display:flex;min-height:0}
.modal-sidebar{width:90px;flex-shrink:0;padding:12px 6px;border-right:0.5px solid rgba(0,0,0,0.05);display:flex;flex-direction:column;gap:2px}
.msb{display:flex;align-items:center;padding:8px 10px;border-radius:var(--radius-xs);background:transparent;border:none;color:var(--text-tertiary);font-size:12px;font-family:inherit;cursor:pointer;transition:all 0.2s;text-align:left;width:100%}
.msb:hover{color:var(--text-secondary);background:rgba(0,0,0,0.03)}
.msb.active{color:var(--accent);background:var(--glass-accent)}
.modal-content{flex:1;padding:20px 24px;overflow-y:auto;min-width:0}
.wg-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:0.5px solid rgba(0,0,0,0.04)}
.wg-item:last-child{border-bottom:none}
.wg-name{font-size:13px;color:var(--text)}
.wg-desc{font-size:11px;color:var(--text-tertiary)}
.wg-toggle{width:36px;height:20px;border-radius:10px;border:none;cursor:pointer;transition:all 0.2s;position:relative;flex-shrink:0}
.wg-toggle.on{background:var(--accent)}
.wg-toggle.off{background:rgba(0,0,0,0.1)}
.wg-toggle::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:transform 0.2s}
.wg-toggle.on::after{transform:translateX(16px)}
.mb input[type=time],.modal-content input[type=time]{width:100%;padding:9px 12px;font-size:13px;border:none;border-radius:var(--radius-xs);background:var(--nm-surface);color:var(--text);outline:none;font-family:inherit;box-shadow:var(--nm-in)}
.mb .f,.modal-content .f{margin-bottom:12px}
.mb .f label,.modal-content .f label{font-size:12px;color:var(--text-secondary);display:block;margin-bottom:4px}
.mb .btn,.modal-content .btn{width:100%;padding:9px;font-size:13px;font-weight:600;border:none;border-radius:var(--radius-xs);background:var(--glass-accent);color:var(--accent);cursor:pointer;font-family:inherit}
.dc{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:7px 4px;border:0.5px solid var(--glass-border);border-radius:7px;background:rgba(255,255,255,0.4);transition:all 0.15s;min-width:36px;user-select:none}
.dc:hover{border-color:rgba(0,0,0,0.1)}
.dc span{font-size:11px;color:var(--text-tertiary)}
.dc.active{border-color:var(--accent);background:var(--glass-accent)}
.dc.active span{color:var(--accent);font-weight:600}
.qi{display:flex;align-items:flex-start;gap:6px;padding:6px 0;border-bottom:0.5px solid rgba(0,0,0,0.04);font-size:11px}
.qi .i{color:var(--text-tertiary);font-size:10px;flex-shrink:0;min-width:18px;text-align:right}
.qi .t{flex:1;color:var(--text-secondary)}
.qi .a button{background:none;border:0.5px solid var(--glass-border);color:var(--text-tertiary);padding:2px 7px;border-radius:5px;cursor:pointer;font-size:10px;font-family:inherit}
.qi .a button:hover{border-color:var(--accent);color:var(--accent)}
.aqr{display:flex;gap:6px;margin-top:8px}
.aqr input{flex:1;padding:7px 10px;font-size:12px;border:none;border-radius:var(--radius-xs);background:var(--nm-surface);color:var(--text);outline:none;font-family:inherit;box-shadow:var(--nm-in)}
.aqr button{padding:7px 12px;font-size:12px;border:0.5px solid var(--glass-border);border-radius:var(--radius-xs);background:transparent;color:var(--text-secondary);cursor:pointer;font-family:inherit}
.aqr button:hover{border-color:var(--accent);color:var(--accent)}
.links-card{padding:12px 14px}
.links-head{margin-bottom:6px}
.links-title{font-size:13px;font-weight:600;color:var(--text-secondary);letter-spacing:.5px}
.links-list{display:flex;flex-direction:column}
.links-empty{font-size:12px;color:var(--text-tertiary);text-align:center;padding:10px 0}
.links-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:0.5px solid rgba(0,0,0,0.04)}
.links-row:last-child{border-bottom:none}
.links-name{flex:1;min-width:0;font-size:13px;color:var(--text);text-decoration:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.links-name:hover{color:var(--accent)}
.links-del{background:none;border:none;color:var(--text-tertiary);cursor:pointer;font-size:12px;padding:2px 4px;opacity:0;transition:opacity .15s;flex-shrink:0}
.links-row:hover .links-del{opacity:1}
.links-add{display:flex;gap:6px;margin-top:8px}
.links-add input{flex:1;min-width:0;padding:7px 10px;font-size:12px;border:none;border-radius:var(--radius-xs);background:var(--nm-surface);color:var(--text);outline:none;font-family:inherit;box-shadow:var(--nm-in)}
.links-add button{padding:7px 12px;font-size:12px;border:none;border-radius:var(--radius-xs);background:var(--glass-accent);color:var(--accent);cursor:pointer;font-family:inherit;font-weight:600}
.ctx-menu{display:none;position:fixed;z-index:200;background:var(--nm-surface);backdrop-filter:none;-webkit-backdrop-filter:none;border-radius:10px;box-shadow:var(--nm-out);padding:4px;min-width:140px}
.fish-card{padding:12px 14px;text-align:center}
.fish-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.fish-title{font-size:13px;font-weight:600;color:var(--text-secondary);letter-spacing:.5px}
.fish-merit{font-size:22px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums;font-family:'Courier New',ui-monospace,monospace}
.fish-btn{width:84px;height:84px;border-radius:50%;border:none;background:var(--nm-surface);box-shadow:var(--nm-out);color:var(--accent);font-size:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .08s,box-shadow .15s;margin:4px auto 2px;font-family:inherit}
.fish-btn:active{transform:scale(.92);box-shadow:var(--nm-in)}
.fish-hint{font-size:11px;color:var(--text-tertiary)}
.ctx-menu.open{display:block}
.ctx-menu button{display:block;width:100%;padding:8px 14px;font-size:12px;font-family:inherit;border:none;background:transparent;color:var(--text);cursor:pointer;text-align:left;border-radius:6px;transition:all 0.1s}
.ctx-menu button:hover{background:var(--glass-accent);color:var(--accent)}
.wp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.wp-item{aspect-ratio:16/10;border-radius:var(--radius-sm);cursor:pointer;background-size:cover;background-position:center;border:2px solid transparent;transition:all 0.2s}
.wp-item:hover{border-color:var(--accent);transform:scale(1.02)}
.wp-item.active{border-color:var(--accent)}
.wp-item.active::after{content:'✓';position:absolute;top:6px;right:8px;color:#fff;font-size:14px;font-weight:700;text-shadow:0 1px 3px rgba(0,0,0,0.5)}
/* 薪资跳动 · 明细卡片 */
.sal-card{padding:18px 18px 16px}
.sal-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px 28px;align-items:start}
.sal-left{min-width:0}
.sal-title{font-size:14px;font-weight:600;color:var(--text-secondary);letter-spacing:.5px;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.sal-label{font-size:11px;color:var(--text-tertiary)}
.sal-amount{font-size:44px;font-weight:700;color:#f97316;letter-spacing:-1px;line-height:1.1;margin:4px 0 8px;font-variant-numeric:tabular-nums;font-family:'Courier New',ui-monospace,monospace}
.sal-breakdown{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-secondary);flex-wrap:wrap}
.sal-breakdown .bd-item{display:flex;flex-direction:column;align-items:center;line-height:1.3}
.sal-breakdown .bd-item span:first-child{font-size:10px;color:var(--text-tertiary)}
.sal-breakdown .bd-item span:last-child{font-variant-numeric:tabular-nums;font-size:13px;font-family:'Courier New',ui-monospace,monospace}
.sal-breakdown .bd-sym{color:var(--text-tertiary);font-size:14px}
.sal-breakdown .t-green{color:#10b981}
.sal-right{display:flex;flex-direction:column;align-items:center;padding-top:2px}
.sal-toggle{display:flex;background:var(--nm-surface);border-radius:30px;padding:3px;width:100%;max-width:200px;box-shadow:inset 5px 5px 10px rgba(174,174,178,.5),inset -5px -5px 10px rgba(255,255,255,.9)}
.sal-tb{flex:1;border-radius:26px;padding:8px 0;text-align:center;font-weight:600;font-size:13px;cursor:pointer;transition:all .2s;user-select:none;color:var(--text-tertiary)}
.sal-tb.active{background:var(--nm-surface);color:var(--accent);box-shadow:3px 3px 8px rgba(174,174,178,.3),-3px -3px 8px rgba(255,255,255,.8)}
.sal-timer{font-size:30px;font-weight:500;color:var(--text);margin-top:12px;letter-spacing:1px;font-variant-numeric:tabular-nums;font-family:ui-monospace,'Courier New',monospace}
.sal-text{color:var(--text-secondary);font-size:13px;margin-top:4px}
.sal-bottom{grid-column:1/-1;margin-top:14px;background:var(--nm-surface);border-radius:14px;padding:14px 16px;box-shadow:var(--nm-in)}
.sal-ticks{display:flex;justify-content:space-between;font-size:11px;font-weight:500;color:var(--text-tertiary);margin-bottom:4px}
.sal-trackwrap{position:relative;margin-top:2px}
.sal-track{position:relative;height:22px;width:100%;background:#e2e8f0;border-radius:11px;overflow:hidden}
.sal-seg{position:absolute;height:100%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;color:#fff;overflow:hidden;white-space:nowrap}
.seg-work{background:#3b82f6}
.seg-rest{background:#10b981}
.sal-indicator{position:absolute;top:0;left:0;width:2px;height:22px;background:#ef4444;z-index:10;border-radius:2px;transition:left .8s cubic-bezier(.4,0,.2,1);transform:translateX(-50%)}
.sal-indicator::before{content:'';position:absolute;top:-4px;left:50%;transform:translateX(-50%);width:8px;height:8px;background:#ef4444;border-radius:50%}
.sal-countdown{text-align:center;margin-top:10px;font-size:13px;color:var(--text-secondary)}
.sal-countdown span{color:#3b82f6;font-weight:600;font-variant-numeric:tabular-nums;font-family:ui-monospace,monospace}
.sal-payday{text-align:center;font-size:10px;color:var(--text-tertiary);margin-top:6px;border-top:.5px solid rgba(0,0,0,.04);padding-top:6px}
@container (max-width:450px){.sal-grid{grid-template-columns:1fr;gap:12px}.sal-amount{font-size:34px}.sal-timer{font-size:24px}.sal-right{padding-top:0}}
/* 金价 / 基金 卡片（各占半宽） */
.gold-card{padding:12px 14px}
.fund-card{padding:12px 14px}
.quote-card{padding:18px 18px 16px;display:flex;flex-direction:column}
.quote-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.quote-title{font-size:14px;font-weight:600;color:var(--text-secondary);letter-spacing:.5px;display:flex;align-items:center;gap:6px}
.quote-hint{font-size:10px;color:var(--text-tertiary)}
.quote-text{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;font-size:15px;line-height:1.7;color:var(--text);cursor:pointer;padding:4px 0;word-break:break-word}
/* 基金列表（行情卡片内） */
.fund-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.fund-title{font-size:14px;font-weight:600;color:var(--text-secondary);letter-spacing:.5px;display:flex;align-items:center;gap:6px}
.fund-meta{display:flex;align-items:center;gap:8px}
.fund-upd{font-size:10px;color:var(--text-tertiary);font-variant-numeric:tabular-nums;min-height:12px}
.fund-refresh{width:26px;height:26px;border-radius:50%;border:none;background:var(--nm-surface);box-shadow:var(--nm-out-sm);color:var(--text-tertiary);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:color .15s,box-shadow .15s;font-family:inherit}
.fund-refresh:hover{color:var(--accent)}
.fund-refresh:active{box-shadow:var(--nm-in-sm)}
.fund-refresh.spin{color:var(--accent);animation:goldspin 1s linear infinite}
.fund-list{display:flex;flex-direction:column}
.fund-empty{font-size:12px;color:var(--text-tertiary);text-align:center;padding:14px 0}
.fund-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:0.5px solid rgba(0,0,0,0.04)}
.fund-row:last-child{border-bottom:none}
.fund-main{flex:1;min-width:0}
.fund-name{font-size:13px;color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fund-sub{font-size:10px;color:var(--text-tertiary);margin-top:2px;font-variant-numeric:tabular-nums;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fund-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0}
.fund-gsz{font-size:14px;font-weight:600;color:var(--text);font-variant-numeric:tabular-nums;font-family:'Courier New',ui-monospace,monospace}
.fund-chg{font-size:11px;font-weight:600;font-variant-numeric:tabular-nums}
.fund-chg.up{color:#10b981}
.fund-chg.down{color:#ef4444}
.fund-chg.flat{color:var(--text-tertiary)}
.fund-del{background:none;border:none;color:var(--text-tertiary);cursor:pointer;font-size:12px;padding:2px 4px;opacity:0;transition:opacity .15s;flex-shrink:0}
.fund-row:hover .fund-del{opacity:1}
.fund-add{display:flex;gap:6px;margin-top:10px}
.fund-add input{flex:1;padding:8px 10px;font-size:12px;border:none;border-radius:var(--radius-xs);background:var(--nm-surface);color:var(--text);outline:none;font-family:inherit;box-shadow:var(--nm-in);min-width:0}
.fund-add input.err{box-shadow:var(--nm-in),0 0 0 1.5px #ef4444}
.fund-add button{padding:8px 14px;font-size:12px;border:none;border-radius:var(--radius-xs);background:var(--glass-accent);color:var(--accent);cursor:pointer;font-family:inherit;font-weight:600}
.gold-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.gold-title{font-size:14px;font-weight:600;color:var(--text-secondary);letter-spacing:.5px;display:flex;align-items:center;gap:6px}
.gold-meta{display:flex;align-items:center;gap:8px}
.gold-upd{font-size:10px;color:var(--text-tertiary);font-variant-numeric:tabular-nums}
.gold-refresh{width:26px;height:26px;border-radius:50%;border:none;background:var(--nm-surface);box-shadow:var(--nm-out-sm);color:var(--text-tertiary);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:color .15s,box-shadow .15s;font-family:inherit}
.gold-refresh:hover{color:var(--accent)}
.gold-refresh:active{box-shadow:var(--nm-in-sm)}
.gold-refresh.spin{color:var(--accent);animation:goldspin 1s linear infinite}
@keyframes goldspin{to{transform:rotate(360deg)}}
.gold-main{display:flex;align-items:baseline;gap:8px;margin-bottom:8px}
