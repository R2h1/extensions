<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>新标签页</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #1c1c1c;
      --card: #242424;
      --card-hover: #2a2a2a;
      --border: #333;
      --text: #e4e4e4;
      --text-secondary: #a3a3a3;
      --text-tertiary: #666;
      --orange: #f97316;
      --orange-light: #fb923c;
      --orange-bg: rgba(249, 115, 22, 0.1);
      --radius: 12px;
      --radius-sm: 8px;
    }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    body {
      display: flex;
      flex-direction: column;
      max-width: 840px;
      margin: 0 auto;
      padding: 52px 32px 28px;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      margin-bottom: 44px;
      animation: fadeIn 0.6s ease-out;
    }
    .time {
      font-size: 60px;
      font-weight: 200;
      letter-spacing: 6px;
      font-family: 'Courier New', Courier, monospace;
      color: var(--text);
      line-height: 1;
    }
    .date {
      font-size: 14px;
      color: var(--text-secondary);
      margin-top: 10px;
      letter-spacing: 1px;
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 16px;
      flex: 1;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      transition: border-color 0.2s, background 0.2s;
    }
    .card:hover {
      border-color: #444;
    }
    .card-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-tertiary);
      letter-spacing: 3px;
      margin-bottom: 16px;
      text-transform: uppercase;
    }

    /* ── 木鱼 ── */
    .fish-stats {
      margin-bottom: 16px;
    }
    .fish-stats .label {
      font-size: 12px;
      color: var(--text-tertiary);
      display: block;
      letter-spacing: 1px;
      margin-bottom: 2px;
    }
    .fish-stats .count {
      font-size: 40px;
      font-weight: 500;
      color: var(--orange);
      font-family: 'Courier New', monospace;
      transition: transform 0.15s;
    }
    .fish-btn {
      width: 100%;
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: var(--radius-sm);
      background: var(--orange-bg);
      color: var(--orange-light);
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 2px;
    }
    .fish-btn:hover {
      background: rgba(249, 115, 22, 0.2);
      transform: translateY(-1px);
    }
    .fish-btn:active {
      transform: translateY(0) scale(0.98);
    }
    .fish-btn.knock {
      animation: knock 0.2s ease;
    }
    @keyframes knock {
      0% { transform: scale(1); }
      40% { transform: scale(0.95); }
      70% { transform: scale(1.02); }
      100% { transform: scale(1); }
    }

    /* ── Todo ── */
    .todo-input-wrap {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }
    .todo-input {
      flex: 1;
      padding: 10px 12px;
      font-size: 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    .todo-input:focus {
      border-color: var(--orange);
    }
    .todo-add-btn {
      padding: 10px 16px;
      font-size: 16px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .todo-add-btn:hover {
      border-color: var(--orange);
      color: var(--orange);
      background: var(--orange-bg);
    }
    .todo-list {
      list-style: none;
    }
    .todo-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid #2a2a2a;
      font-size: 14px;
      animation: slideIn 0.25s ease-out;
    }
    .todo-item:last-child { border-bottom: none; }
    .todo-check {
      width: 18px;
      height: 18px;
      border: 1.5px solid var(--border);
      border-radius: 4px;
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      color: transparent;
      font-size: 11px;
      font-weight: 700;
    }
    .todo-check:hover { border-color: var(--orange); }
    .todo-check.done {
      background: var(--orange);
      border-color: var(--orange);
      color: #1c1c1c;
    }
    .todo-text {
      flex: 1;
      color: var(--text);
      transition: color 0.2s;
    }
    .todo-text.done {
      text-decoration: line-through;
      color: var(--text-tertiary);
    }
    .todo-del {
      background: none;
      border: none;
      color: #4a4a4a;
      cursor: pointer;
      font-size: 14px;
      padding: 2px 6px;
      border-radius: 4px;
      transition: all 0.15s;
      opacity: 0;
    }
    .todo-item:hover .todo-del { opacity: 1; }
    .todo-del:hover { color: #888; background: #2a2a2a; }
    .todo-empty {
      font-size: 13px;
      color: #4a4a4a;
      text-align: center;
      padding: 28px 0;
      letter-spacing: 1px;
    }

    /* ── Footer ── */
    .footer {
      margin-top: 28px;
      padding-top: 16px;
      border-top: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .lunch {
      font-size: 13px;
      color: var(--text-secondary);
      letter-spacing: 0.5px;
    }
    .lunch .time-val {
      color: var(--orange);
      font-weight: 600;
    }
    .settings-btn {
      background: none;
      border: none;
      color: var(--text-tertiary);
      cursor: pointer;
      font-size: 16px;
      padding: 6px 10px;
      border-radius: var(--radius-sm);
      transition: all 0.2s;
    }
    .settings-btn:hover {
      color: var(--text-secondary);
      background: #2a2a2a;
    }

    /* ── Animations ── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in {
      animation: fadeIn 0.4s ease-out;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="time" id="timeDisplay">--:--</div>
    <div class="date" id="dateDisplay"></div>
  </header>

  <div class="grid">
    <div class="card">
      <div class="card-title">敲木鱼</div>
      <div class="fish-stats">
        <span class="label">功德</span>
        <span class="count" id="meritCount">0</span>
      </div>
      <button class="fish-btn" id="fishBtn">敲 !</button>
    </div>

    <div class="card">
      <div class="card-title">今日待办</div>
      <div class="todo-input-wrap">
        <input class="todo-input" id="todoInput" placeholder="写点什么..." />
        <button class="todo-add-btn" id="todoAddBtn">+</button>
      </div>
      <ul class="todo-list" id="todoList"></ul>
    </div>
  </div>

  <footer class="footer">
    <div class="lunch" id="lunchDisplay">🍱 午餐 --:-- · -- 后</div>
    <button class="settings-btn" id="settingsBtn">⚙</button>
  </footer>

  <script src="newtab.js"></script>
</body>
</html>
